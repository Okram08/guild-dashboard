<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grimoire des Décisions · Mille Royaume</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=Cinzel:wght@400;500;600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">

  <script src="common.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-deep:       #0a0611;
      --bg-panel:      rgba(28, 18, 34, 0.78);
      --bg-panel-hi:   rgba(40, 28, 48, 0.88);
      --gold:          #d4a744;
      --gold-hi:       #fbbf24;
      --gold-soft:     rgba(212, 167, 68, 0.35);
      --ink:           #f0e4c4;
      --ink-dim:       #a89878;
      --crimson:       #a03028;
      --border:        rgba(212, 167, 68, 0.18);

      --tag-apport:    #4ade80;
      --tag-vente:     #ef4444;
      --tag-rebalance: #3b82f6;
      --tag-reflexion: #a855f7;
      --tag-macro:     #06b6d4;
      --tag-autre:     #9ca3af;
    }

    body {
      background:
        radial-gradient(ellipse at top, rgba(212, 167, 68, 0.06), transparent 60%),
        radial-gradient(ellipse at bottom right, rgba(168, 85, 247, 0.05), transparent 55%),
        var(--bg-deep);
      color: var(--ink);
      font-family: 'EB Garamond', Georgia, serif;
      min-height: 100vh;
      padding: 40px 60px;
      background-attachment: fixed;
    }

    /* Header */
    header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 24px;
      margin-bottom: 28px;
    }
    .back-link {
      color: var(--ink-dim);
      text-decoration: none;
      font-family: 'Cinzel', serif;
      font-size: 14px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      transition: color .2s;
    }
    .back-link:hover { color: var(--gold-hi); }
    h1 {
      font-family: 'UnifrakturCook', serif;
      font-weight: 700;
      font-size: 42px;
      color: var(--gold-hi);
      text-shadow: 0 0 30px rgba(251, 191, 36, 0.25);
      letter-spacing: 0.02em;
      margin-top: 2px;
    }
    .header-sub {
      text-align: right;
      font-style: italic;
      color: var(--ink-dim);
      font-size: 14px;
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .toolbar input[type="text"] {
      flex: 1;
      min-width: 200px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 10px 14px;
      border-radius: 3px;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
    }
    .toolbar input[type="text"]:focus {
      outline: none;
      border-color: var(--gold-soft);
    }

    button, .btn {
      font-family: 'Cinzel', serif;
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--gold-soft);
      padding: 9px 18px;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      transition: all .2s;
    }
    button:hover, .btn:hover {
      background: rgba(212, 167, 68, 0.08);
      border-color: var(--gold-hi);
      color: var(--gold-hi);
    }
    button.primary {
      background: rgba(212, 167, 68, 0.18);
      border-color: var(--gold);
      color: var(--gold-hi);
    }
    button.primary:hover { background: rgba(212, 167, 68, 0.28); }

    /* Tag pills */
    .tag-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 5px 11px;
      border-radius: 12px;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all .2s;
      font-weight: 500;
    }
    .tag-pill:hover {
      background: rgba(255,255,255,0.05);
      color: var(--ink);
    }
    .tag-pill.active {
      color: var(--ink);
      background: rgba(255,255,255,0.08);
      border-color: currentColor;
    }
    .tag-pill .count {
      opacity: 0.5;
      font-size: 10px;
    }

    /* Month separator */
    .month-sep {
      font-family: 'UnifrakturCook', serif;
      font-size: 22px;
      color: var(--gold);
      margin: 32px 0 14px 0;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      letter-spacing: 0.02em;
      opacity: 0.85;
    }
    .month-sep:first-of-type { margin-top: 0; }

    /* Entry card */
    .entry {
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--tag-color, var(--gold));
      border-radius: 4px;
      padding: 20px 24px;
      margin-bottom: 12px;
      transition: all .2s;
      position: relative;
    }
    .entry:hover {
      background: var(--bg-panel-hi);
      border-color: rgba(212, 167, 68, 0.28);
    }
    .entry-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
      font-size: 13px;
      color: var(--ink-dim);
    }
    .entry-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-family: 'Cinzel', serif;
      font-size: 10px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--tag-color, var(--gold));
      font-weight: 500;
    }
    .entry-date {
      font-style: italic;
    }
    .entry-snap {
      margin-left: auto;
      font-family: 'Cinzel', serif;
      font-size: 12px;
      color: var(--gold-hi);
      opacity: 0.7;
    }
    .entry-title {
      font-family: 'Cinzel', serif;
      font-weight: 500;
      font-size: 17px;
      color: var(--ink);
      margin-bottom: 8px;
    }
    .entry-body {
      font-size: 15px;
      line-height: 1.55;
      color: var(--ink);
      white-space: pre-wrap;
      word-break: break-word;
    }
    .entry-actions {
      position: absolute;
      top: 14px;
      right: 14px;
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity .2s;
    }
    .entry:hover .entry-actions { opacity: 1; }
    .icon-btn {
      width: 26px; height: 26px;
      border: 1px solid var(--border);
      background: rgba(10,6,17,0.6);
      color: var(--ink-dim);
      border-radius: 3px;
      cursor: pointer;
      font-size: 11px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      transition: all .2s;
    }
    .icon-btn:hover { color: var(--gold-hi); border-color: var(--gold-soft); }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-dim);
      font-style: italic;
      font-size: 16px;
    }
    .empty-state svg { opacity: 0.4; margin-bottom: 20px; }
    .empty-state .cta { margin-top: 20px; }

    /* Modal */
    .modal-veil {
      position: fixed;
      inset: 0;
      background: rgba(10, 6, 17, 0.85);
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .modal-veil.show { display: flex; }
    .modal-body {
      background: var(--bg-panel-hi);
      border: 1px solid var(--gold-soft);
      border-radius: 4px;
      padding: 32px 36px;
      max-width: 640px;
      width: 100%;
      max-height: 92vh;
      overflow-y: auto;
    }
    .modal-body h2 {
      font-family: 'UnifrakturCook', serif;
      color: var(--gold-hi);
      font-size: 28px;
      margin-bottom: 6px;
      font-weight: 700;
    }
    .modal-body .modal-sub {
      font-size: 13px;
      color: var(--ink-dim);
      font-style: italic;
      margin-bottom: 22px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .field input, .field textarea, .field select {
      width: 100%;
      background: rgba(10, 6, 17, 0.6);
      border: 1px solid var(--border);
      color: var(--ink);
      padding: 10px 12px;
      border-radius: 3px;
      font-family: 'EB Garamond', serif;
      font-size: 15px;
    }
    .field textarea {
      resize: vertical;
      min-height: 180px;
      line-height: 1.55;
    }
    .field input:focus, .field textarea:focus, .field select:focus {
      outline: none;
      border-color: var(--gold-hi);
    }

    .tag-select {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tag-select .tag-pill {
      cursor: pointer;
    }
    .tag-select .tag-pill.selected {
      color: var(--ink);
      background: var(--tag-color);
      background: rgba(255,255,255,0.12);
      border-color: var(--tag-color);
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    /* Stats bar */
    .stats {
      display: flex;
      gap: 24px;
      padding: 16px 20px;
      background: var(--bg-panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 24px;
      font-size: 14px;
    }
    .stats .stat {
      color: var(--ink-dim);
    }
    .stats .stat b {
      color: var(--gold-hi);
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 15px;
      margin-right: 4px;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      padding-top: 24px;
      border-top: 1px solid var(--border);
      color: var(--ink-dim);
      font-size: 12px;
      font-style: italic;
    }

    @media (max-width: 720px) {
      body { padding: 20px 16px; }
      h1 { font-size: 28px; }
      header { flex-direction: column; align-items: flex-start; gap: 8px; }
      .stats { flex-direction: column; gap: 6px; }
      .entry-meta { flex-wrap: wrap; }
      .entry-snap { margin-left: 0; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <a href="index.html" class="back-link">← Retour à la Guilde</a>
    <h1>Grimoire des Décisions</h1>
  </div>
  <div class="header-sub">
    Carnet de bord de l'investisseur<br>
    <span id="journalMeta">—</span>
  </div>
</header>

<div class="stats" id="statsBar"></div>

<div class="toolbar">
  <input type="text" id="searchInput" placeholder="🔍 Rechercher dans les entrées…" oninput="render()">
  <button class="primary" onclick="openEditor()">✎ Nouvelle entrée</button>
</div>

<div class="tag-filters" id="tagFilters"></div>

<section id="entriesContainer">
  <div class="empty-state">Chargement…</div>
</section>

<footer>
  ❧ Registre local · GitHub Pages · Aucun serveur ❧
</footer>

<!-- Editor Modal -->
<div class="modal-veil" id="editorVeil">
  <div class="modal-body">
    <h2 id="editorTitle">Nouvelle entrée</h2>
    <div class="modal-sub" id="editorSub">Inscris ta pensée dans le grimoire</div>
    <div class="field">
      <label>Nature de l'entrée</label>
      <div class="tag-select" id="tagSelector"></div>
    </div>
    <div class="field">
      <label>Titre</label>
      <input type="text" id="entryTitle" placeholder="Ex: DCA de mai · profité du creux BTC" maxlength="120">
    </div>
    <div class="field">
      <label>Corps de l'entrée</label>
      <textarea id="entryBody" placeholder="Qu'as-tu décidé ? Qu'as-tu observé ? Qu'as-tu ressenti ?&#10;&#10;Le futur-toi te remerciera de l'avoir écrit."></textarea>
    </div>
    <div class="modal-actions">
      <button onclick="closeEditor()">Annuler</button>
      <button class="primary" onclick="saveEntry()" id="saveBtn">Sceller l'entrée</button>
    </div>
  </div>
</div>

<script>
/* ================================================================
   journal.html — logic
   State key: guildJournal.state
   Depends on: common.js (window.GDCommon)
   ================================================================ */

const LS_STATE = "guildJournal.state";

const TAGS = [
  { id: "apport",    label: "Apport",    icon: "💰", color: "var(--tag-apport)"    },
  { id: "vente",     label: "Vente",     icon: "📉", color: "var(--tag-vente)"     },
  { id: "rebalance", label: "Rebalance", icon: "⚖",  color: "var(--tag-rebalance)" },
  { id: "reflexion", label: "Réflexion", icon: "🧠", color: "var(--tag-reflexion)" },
  { id: "macro",     label: "Macro",     icon: "🌍", color: "var(--tag-macro)"     },
  { id: "autre",     label: "Autre",     icon: "📝", color: "var(--tag-autre)"     },
];

const DEFAULT_STATE = {
  entries: [],
};

let state = loadState();
let editingId = null;
let currentFilter = "all";   // tag id or "all"
let currentSearch = "";

/* -------- State -------- */
function loadState(){
  try {
    const raw = localStorage.getItem(LS_STATE);
    if(raw){
      const parsed = JSON.parse(raw);
      return { ...DEFAULT_STATE, ...parsed };
    }
  } catch(e){ console.warn("loadState fail", e); }
  return { ...DEFAULT_STATE };
}
function saveState(){
  try { localStorage.setItem(LS_STATE, JSON.stringify(state)); }
  catch(e){ console.warn("saveState fail", e); }
}

function generateId(){
  return "j_" + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

/* -------- CRUD -------- */
function createEntry(data){
  const snap = GDCommon.readSnapshot();
  const entry = {
    id: generateId(),
    t: Date.now(),
    title: (data.title || "").trim().slice(0, 120),
    body:  (data.body || "").trim(),
    tag:   data.tag || "autre",
    snapshot: snap ? { total: snap.total || 0, guildName: snap.guildName || "" } : null,
  };
  state.entries.push(entry);
  saveState();
  return entry;
}

function updateEntry(id, data){
  const e = state.entries.find(x => x.id === id);
  if(!e) return null;
  e.title = (data.title || "").trim().slice(0, 120);
  e.body  = (data.body || "").trim();
  e.tag   = data.tag || "autre";
  e.editedAt = Date.now();
  saveState();
  return e;
}

function deleteEntry(id){
  const e = state.entries.find(x => x.id === id);
  if(!e) return;
  if(!confirm(`Brûler définitivement l'entrée "${e.title}" ?`)) return;
  state.entries = state.entries.filter(x => x.id !== id);
  saveState();
  render();
  GDCommon.toast("Entrée effacée");
}

/* -------- Filtering -------- */
function filteredEntries(){
  let list = [...state.entries];
  // Tag filter
  if(currentFilter && currentFilter !== "all"){
    list = list.filter(e => e.tag === currentFilter);
  }
  // Search
  const q = (currentSearch || "").trim().toLowerCase();
  if(q){
    list = list.filter(e =>
      (e.title || "").toLowerCase().includes(q) ||
      (e.body  || "").toLowerCase().includes(q)
    );
  }
  // Newest first
  list.sort((a,b) => b.t - a.t);
  return list;
}

/* -------- Rendering -------- */
function tagDef(id){ return TAGS.find(t => t.id === id) || TAGS[TAGS.length - 1]; }

function renderTagFilters(){
  const el = document.getElementById("tagFilters");
  const counts = { all: state.entries.length };
  for(const t of TAGS) counts[t.id] = 0;
  for(const e of state.entries){
    if(counts[e.tag] != null) counts[e.tag]++;
  }
  const pills = [`
    <span class="tag-pill ${currentFilter==='all' ? 'active' : ''}" onclick="setFilter('all')" style="color: var(--ink)">
      Tout <span class="count">${counts.all}</span>
    </span>`];
  for(const t of TAGS){
    if(counts[t.id] === 0 && currentFilter !== t.id) continue; // hide empty tags
    pills.push(`
      <span class="tag-pill ${currentFilter===t.id ? 'active' : ''}"
            onclick="setFilter('${t.id}')"
            style="color: ${t.color}">
        <span>${t.icon}</span> ${t.label} <span class="count">${counts[t.id]}</span>
      </span>`);
  }
  el.innerHTML = pills.join("");
}

function setFilter(tagId){
  currentFilter = tagId;
  render();
}

function renderStats(){
  const el = document.getElementById("statsBar");
  const total = state.entries.length;
  const snap = GDCommon.readSnapshot();
  const now = snap ? `${GDCommon.fmt(snap.total || 0)} €` : "—";
  let monthCount = 0;
  const currentMonth = new Date().getMonth();
  const currentYear = new Date().getFullYear();
  for(const e of state.entries){
    const d = new Date(e.t);
    if(d.getMonth() === currentMonth && d.getFullYear() === currentYear) monthCount++;
  }
  el.innerHTML = `
    <div class="stat"><b>${total}</b> entrée${total > 1 ? "s" : ""} au grimoire</div>
    <div class="stat"><b>${monthCount}</b> ce mois-ci</div>
    <div class="stat">État actuel : <b>${now}</b></div>
  `;
}

function monthLabel(ts){
  const d = new Date(ts);
  return d.toLocaleDateString("fr-FR", { month: "long", year: "numeric" });
}

function dateLabel(ts){
  const d = new Date(ts);
  return d.toLocaleDateString("fr-FR", { day: "numeric", month: "long", year: "numeric" });
}

function escapeHtml(s){
  return String(s || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#039;");
}

function renderEntries(){
  const el = document.getElementById("entriesContainer");
  const list = filteredEntries();
  if(!list.length){
    const isEmpty = state.entries.length === 0;
    el.innerHTML = `
      <div class="empty-state">
        ${isEmpty
          ? `Le grimoire est vierge.<br>Inscris ta première pensée d'investisseur.
             <div class="cta"><button class="primary" onclick="openEditor()">✎ Commencer le grimoire</button></div>`
          : `Aucune entrée ne correspond à ta recherche.`
        }
      </div>`;
    return;
  }
  // Group by month
  let html = "";
  let currentMonth = null;
  for(const e of list){
    const m = monthLabel(e.t);
    if(m !== currentMonth){
      html += `<div class="month-sep">${m}</div>`;
      currentMonth = m;
    }
    const tag = tagDef(e.tag);
    const snapText = e.snapshot && e.snapshot.total
      ? `État : ${GDCommon.fmt(e.snapshot.total)} €`
      : "";
    const bodyHtml = escapeHtml(e.body).replace(/\n/g, "<br>");
    html += `
      <div class="entry" style="--tag-color: ${tag.color}">
        <div class="entry-meta">
          <span class="entry-tag" style="--tag-color: ${tag.color}"><span>${tag.icon}</span> ${tag.label}</span>
          <span class="entry-date">${dateLabel(e.t)}</span>
          ${snapText ? `<span class="entry-snap">${snapText}</span>` : ""}
        </div>
        <div class="entry-title">${escapeHtml(e.title) || "<em style='color: var(--ink-dim)'>Sans titre</em>"}</div>
        <div class="entry-body">${bodyHtml}</div>
        <div class="entry-actions">
          <button class="icon-btn" onclick="openEditor('${e.id}')" title="Modifier">✎</button>
          <button class="icon-btn" onclick="deleteEntry('${e.id}')" title="Brûler">🗑</button>
        </div>
      </div>`;
  }
  el.innerHTML = html;
}

function render(){
  currentSearch = (document.getElementById("searchInput") || {}).value || "";
  renderStats();
  renderTagFilters();
  renderEntries();
  document.getElementById("journalMeta").textContent =
    `${state.entries.length} entrée${state.entries.length > 1 ? "s" : ""}`;
}

/* -------- Editor -------- */
let editorTag = "autre";

function renderTagSelector(){
  const el = document.getElementById("tagSelector");
  el.innerHTML = TAGS.map(t => `
    <span class="tag-pill ${editorTag === t.id ? 'selected' : ''}"
          onclick="selectEditorTag('${t.id}')"
          style="color: ${t.color}; --tag-color: ${t.color};">
      <span>${t.icon}</span> ${t.label}
    </span>
  `).join("");
}
function selectEditorTag(tagId){
  editorTag = tagId;
  renderTagSelector();
}

function openEditor(id){
  editingId = id || null;
  if(editingId){
    const e = state.entries.find(x => x.id === editingId);
    if(!e) return;
    document.getElementById("editorTitle").textContent = "Modifier l'entrée";
    document.getElementById("editorSub").textContent = "Corrige le manuscrit";
    document.getElementById("entryTitle").value = e.title || "";
    document.getElementById("entryBody").value  = e.body  || "";
    editorTag = e.tag || "autre";
    document.getElementById("saveBtn").textContent = "Enregistrer";
  } else {
    document.getElementById("editorTitle").textContent = "Nouvelle entrée";
    document.getElementById("editorSub").textContent = "Inscris ta pensée dans le grimoire";
    document.getElementById("entryTitle").value = "";
    document.getElementById("entryBody").value  = "";
    editorTag = "reflexion";
    document.getElementById("saveBtn").textContent = "Sceller l'entrée";
  }
  renderTagSelector();
  document.getElementById("editorVeil").classList.add("show");
  setTimeout(() => document.getElementById("entryTitle").focus(), 50);
}
function closeEditor(){
  document.getElementById("editorVeil").classList.remove("show");
  editingId = null;
}

function saveEntry(){
  const title = document.getElementById("entryTitle").value.trim();
  const body  = document.getElementById("entryBody").value.trim();
  if(!title && !body){
    GDCommon.toast("⚠ Titre ou corps requis");
    return;
  }
  const data = { title, body, tag: editorTag };
  if(editingId){
    updateEntry(editingId, data);
    GDCommon.toast("Entrée modifiée");
  } else {
    createEntry(data);
    GDCommon.toast("Entrée scellée 📖");
  }
  closeEditor();
  render();
}

/* -------- Keyboard shortcuts -------- */
document.addEventListener("keydown", e => {
  // Ctrl+Enter to save in editor
  if((e.ctrlKey || e.metaKey) && e.key === "Enter"){
    if(document.getElementById("editorVeil").classList.contains("show")){
      e.preventDefault();
      saveEntry();
    }
  }
  // Escape to close modal
  if(e.key === "Escape"){
    if(document.getElementById("editorVeil").classList.contains("show")){
      closeEditor();
    }
  }
  // Ctrl+N for new entry
  if((e.ctrlKey || e.metaKey) && e.key === "n"){
    if(!document.getElementById("editorVeil").classList.contains("show")){
      e.preventDefault();
      openEditor();
    }
  }
});

/* -------- Boot -------- */
render();
</script>

</body>
